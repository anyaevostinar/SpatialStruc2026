### MAIN ###
# Global Settings


set SEED 11                       # What value should the random seed be? If seed <= 0, then it is randomly re-chosen.
set DATA_INT 200                  # How frequently, in updates, should data print?
set SYNERGY 4                     # Amount symbiont's returned resources should be multiplied by
set VERTICAL_TRANSMISSION 0.0     # Value 0 to 1 of probability of symbiont vertically transmitting when host reproduces
set GRID_X 100                    # Width of the world, just multiplied by the height to get total size
set GRID_Y 100                    # Height of world, just multiplied by width to get total size
set POP_SIZE -1                   # Starting size of the host population, -1 for full starting population
set SYM_LIMIT 1                   # Number of symbiont allowed to infect a single host
set START_MOI 1                   # Ratio of symbionts to hosts that experiment should start with
set UPDATES 500000                  # Number of updates to run before quitting
set HORIZ_TRANS 1                 # Should non-lytic horizontal transmission occur? 0 for no, 1 for yes
set HOST_REPRO_RES 10           # How many resources required for host reproduction
set SYM_HORIZ_TRANS_RES 5       # How many resources required for symbiont non-lytic horizontal transmission
set SYM_VERT_TRANS_RES 0          # How many resources required for symbiont vertical transmission
set GRID 0                        # Do offspring get placed immediately next to parents on grid, same for symbiont spreading
set SYM_INFECTION_CHANCE 1        # The chance (between 0 and 1) that a sym will infect a parallel host on process
set OUSTING 1                     # Should ousting (incoming symbiont kills and replaces existing symbiont) be turned on? (0 for no, 1 for yes)
set WRITE_ORG_DUMP_FILE 1         # Should all end-of-experiment organisms pairs be written (with their behavior values and reproduction counts) to a data file? (0 for no, 1 for yes)
set DOMINANT_COUNT 10             # Number of dominant hosts to select
set FILE_PATH MOI1_Data               # Output file path 
set FILE_NAME _data               # Root output file name




### MUTATION ###
# Mutation


set MUTATION_SIZE 0.00                 # Standard deviation of the distribution to mutate by


### SGP ###
# Complex Genomes Settings


set CYCLES_PER_UPDATE 16                                # Number of CPU cycles that organisms run every update
set FIND_NEIGHBOR_HOST_ATTEMPTS 10                      # How many times to attempt finding a neighboring host for symbiont to horizontally transmit into
set HOST_MIN_CYCLES_BEFORE_REPRO 400                     # Number of CPU cycles organisms must wait between reproductions
set SYM_MIN_CYCLES_BEFORE_REPRO 25                      # Number of CPU cycles organisms must wait between reproductions
set INTERACTION_MECHANISM stress                      # What sgp organisms should population the world? (Options: 'default')
set VT_TASK_MATCH 0                                    # Should task matching be required for vertical transmission? (0 for no, 1 for yes)
set TASK_PROFILE_MODE self-first                         # What should we use for task profiles for host-symbiont compatibility, preferential ousting, etc.? Options are parent-all, self-all, self-first, parent-first. 'all' means all tasks, 'first' means only first task performed.
set TASK_PROFILE_COMPATIBILITY_MODE task-any-match             # How is compatibility determined for task profiles? Doesn't apply to nutrient interactions, which are on a per-task basis. Options: always, task-any-match, task-perfect-match
set HORIZONTAL_TRANSMISSION_COMPATIBILITY_MODE task-profile-strictly-stronger-match  # How is compatibility determined for horizontal transmission? Options are: always, task-profile-compatible, task-profile-strictly-stronger-match, task-profile-stronger-or-equal-match. Only task-profile-compatible uses the TASK_PROFILE_COMPATABILITY_MODE


### SGP_MUTATION ###
# SGP mutation group


set SGP_MUT_PER_BIT_RATE 0.005  # Per-bit mutation rate for sgp programs


### TASK_ENVIRONMENT ###
# Task environment settings


set TASK_ENV_CFG_PATH flat-reward-5-env.json  # Json file that provides environment configuration
set TASK_IO_BANK_SIZE 10000             # How many possible task input/output combinations to pre-generate?
set TASK_IO_UNIQUE_OUTPUT 1             # Should each output in the pregenerated io combinations be unique?
set HOST_ONLY_FIRST_TASK_CREDIT 1       # Only give host credit for one task (whatever they do first)?
set SYM_ONLY_FIRST_TASK_CREDIT 1        # Only give sym credit for one task (whatever they do first)?

### STRESS ###
# Stress Settings

set ENABLE_STRESS true                                 # Stress interactions enabled?
set STRESS_TYPE parasite                           # What kind of stress symbionts should be incorporated in stressful environments? (Options: 'mutualist', 'parasite', 'neutral')
set STRESS_FREQUENCY 25                           # How often should stress events occur (in updates)?
set PARASITE_DEATH_CHANCE 0.75                       # What death chance does a parasite confer?
set MUTUALIST_DEATH_CHANCE 0                    # What death chance does a mutualist confer?
set BASE_DEATH_CHANCE 0.0                          # What death chance does a host have in the absence of symbionts?
set PARASITE_NUM_OFFSPRING_ON_STRESS_INTERACTION 8  # Number of offspring stress parasite can produce when host dies during stress event
set PARASITE_ESCAPEE_TIMING on-match-host-death     # When should parasites have the opportunity to produce escapees during a stress event? Options: on-match-host-death, on-match


### DATA ###
# Data settings


set PRINT_INTERVAL 100  # How often to print run status
